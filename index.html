<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetroMark MVP</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(145deg, #f1f8f8, #dde9ee);
      color: #153042;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(21, 48, 66, 0.15);
      border-radius: 14px;
      padding: 20px;
      max-width: 560px;
      box-shadow: 0 8px 28px rgba(13, 45, 65, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>MetroMark MVP</h1>
    <p>
      Run this app with the Node server to use the live map, cached Transitland API proxy, account auth,
      and station tracking.
    </p>
    <p>
      Start commands:
      <strong>npm install</strong>
      then
      <strong>npm start</strong>
    </p>
  </div>
</body>
</html>
