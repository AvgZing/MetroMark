<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetroMark MVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-head panel">
          <div>
            <p class="brand-kicker">Transit Exploration Tracker</p>
            <h1>MetroMark</h1>
          </div>
          <div class="head-actions">
            <button id="themeToggleBtn" class="btn btn-icon" type="button" aria-label="Toggle theme">Theme</button>
            <button
              id="accountPopupBtn"
              class="btn btn-icon"
              type="button"
              aria-haspopup="dialog"
              aria-expanded="false"
            >
              Profile
            </button>
          </div>
        </div>

        <section class="panel">
          <h2>Routes</h2>
          <label class="mono-label">
            Search Routes
            <input id="lineSearch" type="search" placeholder="Search route name, number, or operator" />
          </label>

          <div id="modeFilterBar" class="mode-filter-bar" aria-label="Mode filters"></div>
          <div id="frequencyFilterBar" class="mode-filter-bar" aria-label="Frequency filters"></div>
          <div id="lineList" class="line-list" aria-live="polite"></div>
          <button id="resetLineFocusBtn" class="btn" type="button" hidden>Show All Routes</button>
        </section>

        <section class="panel">
          <h2>Progress</h2>
          <p id="progressSummary">Sign in to mark visited stations.</p>
          <div id="lineProgressList" class="line-progress-list"></div>
        </section>

        <section class="panel status-panel">
          <p id="statusText">Initializing map and API...</p>
          <p id="statusMeta" class="microcopy"></p>
          <p id="backendStatusText" class="backend-note"></p>
          <button id="clearSessionCacheBtn" class="btn btn-subtle" type="button">Clear Local Cache</button>
        </section>
      </aside>

      <main class="map-stage">
        <div class="map-overlay-controls" role="group" aria-label="Map style">
          <button id="streetsModeBtn" class="btn btn-icon map-mode-btn" type="button" aria-label="Streets map view">
            <svg class="map-mode-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6.5 8.5 4l7 2.5L21 4v13.5L15.5 20l-7-2.5L3 20V6.5Zm5.5-1v12M15.5 6v12" />
            </svg>
            <span class="mode-label">Streets</span>
          </button>
          <button
            id="satelliteModeBtn"
            class="btn btn-icon map-mode-btn"
            type="button"
            aria-label="Satellite map view"
          >
            <svg class="map-mode-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m5 15 6 4 8-10-6-4-8 10Zm2.6-.5 3.8 2.5m2.2-8.5 3.8 2.5" />
            </svg>
            <span class="mode-label">Satellite</span>
          </button>
        </div>
        <div id="map"></div>
      </main>

      <section class="panel dropdown-panel" id="authPopup" hidden>
        <div class="popup-header">
          <h2>Profile</h2>
          <button id="closeAuthPopupBtn" class="btn popup-close" type="button">Close</button>
        </div>

        <div id="authLoggedOut">
          <button id="demoLoginBtn" class="btn btn-primary" type="button">Use Demo Account</button>

          <form id="loginForm" class="stack-form">
            <label>
              Email
              <input id="loginEmail" name="email" type="email" required />
            </label>
            <label>
              Password
              <input id="loginPassword" name="password" type="password" required />
            </label>
            <button class="btn" type="submit">Login</button>
          </form>

          <form id="registerForm" class="stack-form">
            <label>
              Display Name
              <input id="registerDisplayName" name="displayName" type="text" placeholder="Optional" />
            </label>
            <label>
              Email
              <input id="registerEmail" name="email" type="email" required />
            </label>
            <label>
              Password
              <input id="registerPassword" name="password" type="password" minlength="6" required />
            </label>
            <button class="btn" type="submit">Create Account</button>
          </form>

          <p class="microcopy">Demo credentials are seeded automatically from server settings.</p>
        </div>

        <div id="authLoggedIn" hidden>
          <p>
            Signed in as <strong id="currentUserLabel">-</strong>
          </p>
          <button id="logoutBtn" class="btn" type="button">Log Out</button>
        </div>
      </section>
    </div>

    <script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
